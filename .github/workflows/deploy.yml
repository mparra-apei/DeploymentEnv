name: Deploy Pipeline (config/deploy/main.json)

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: "Path to deployment config JSON"
        required: false
        default: "config/deploy/main.json"
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  setup:
    name: Setup - Read environments from config
    runs-on: ubuntu-latest
    outputs:
      has_stage: ${{ steps.check.outputs.has_stage }}
      has_opsfix: ${{ steps.check.outputs.has_opsfix }}
      has_prod_gateway: ${{ steps.check.outputs.has_prod_gateway }}
      has_prod: ${{ steps.check.outputs.has_prod }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check environments
        id: check
        env:
          CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
        run: |
          echo "has_stage=$(jq '.environments | map(select(. == "STAGE")) | length > 0' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "has_opsfix=$(jq '.environments | map(select(. == "OPSFIX")) | length > 0' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "has_prod_gateway=$(jq '.environments | map(select(. == "PROD_GATEWAY")) | length > 0' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "has_prod=$(jq '.environments | map(select(. == "PROD")) | length > 0' "$CONFIG_FILE")" >> $GITHUB_OUTPUT
          echo "Configured environments:"
          jq '.environments' "$CONFIG_FILE"

  deploy-stage:
    name: Deploy to STAGE
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.has_stage == 'true'
    env:
      DEPLOY_CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
    environment:
      name: STAGE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          echo "Using deploy config: ${DEPLOY_CONFIG_FILE}"
          if [[ ! -f "${DEPLOY_CONFIG_FILE}" ]]; then
            echo "Config file not found: ${DEPLOY_CONFIG_FILE}"
            exit 1
          fi
          jq empty "${DEPLOY_CONFIG_FILE}"

      - name: Build/Test (placeholder)
        run: |
          echo "Running build and tests..."
          # Replace with real commands.

      - name: Deploy to STAGE
        run: |
          bash ./scripts/deploy.sh STAGE "${DEPLOY_CONFIG_FILE}"

  deploy-opsfix:
    name: Deploy to OPSFIX
    runs-on: ubuntu-latest
    needs: [setup, deploy-stage]
    if: always() && needs.setup.outputs.has_opsfix == 'true'
    env:
      DEPLOY_CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
    environment:
      name: OPSFIX
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          echo "Using deploy config: ${DEPLOY_CONFIG_FILE}"
          if [[ ! -f "${DEPLOY_CONFIG_FILE}" ]]; then
            echo "Config file not found: ${DEPLOY_CONFIG_FILE}"
            exit 1
          fi
          jq empty "${DEPLOY_CONFIG_FILE}"

      - name: Build/Test (placeholder)
        run: |
          echo "Running build and tests..."
          # Replace with real commands.

      - name: Deploy to OPSFIX
        run: |
          bash ./scripts/deploy.sh OPSFIX "${DEPLOY_CONFIG_FILE}"

  deploy-prod-gateway:
    name: Deploy to PROD_GATEWAY
    runs-on: ubuntu-latest
    needs: [setup, deploy-opsfix]
    if: always() && needs.setup.outputs.has_prod_gateway == 'true'
    env:
      DEPLOY_CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
    environment:
      name: PROD_GATEWAY
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          echo "Using deploy config: ${DEPLOY_CONFIG_FILE}"
          if [[ ! -f "${DEPLOY_CONFIG_FILE}" ]]; then
            echo "Config file not found: ${DEPLOY_CONFIG_FILE}"
            exit 1
          fi
          jq empty "${DEPLOY_CONFIG_FILE}"

      - name: Build/Test (placeholder)
        run: |
          echo "Running build and tests..."
          # Replace with real commands.

      - name: Deploy to PROD_GATEWAY
        run: |
          bash ./scripts/deploy.sh PROD_GATEWAY "${DEPLOY_CONFIG_FILE}"

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [setup, deploy-prod-gateway]
    if: always() && needs.setup.outputs.has_prod == 'true'
    env:
      DEPLOY_CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
    concurrency:
      group: prod
      cancel-in-progress: false
    environment:
      name: PROD
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          echo "Using deploy config: ${DEPLOY_CONFIG_FILE}"
          if [[ ! -f "${DEPLOY_CONFIG_FILE}" ]]; then
            echo "Config file not found: ${DEPLOY_CONFIG_FILE}"
            exit 1
          fi
          jq empty "${DEPLOY_CONFIG_FILE}"

      - name: Build/Test (placeholder)
        run: |
          echo "Running build and tests..."
          # Replace with real commands.

      - name: Deploy to PROD
        run: |
          bash ./scripts/deploy.sh PROD "${DEPLOY_CONFIG_FILE}"
