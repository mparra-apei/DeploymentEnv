name: Deploy Pipeline (stg -> prod)

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: "Path to deployment config JSON"
        required: false
        default: "config/deploy/main.json"
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-stg:
    name: Deploy to STG
    runs-on: ubuntu-latest
    env:
      DEPLOY_CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
    environment:
      name: STAGE
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          echo "Using deploy config: ${DEPLOY_CONFIG_FILE}"
          if [[ ! -f "${DEPLOY_CONFIG_FILE}" ]]; then
            echo "Config file not found: ${DEPLOY_CONFIG_FILE}"
            exit 1
          fi
          jq empty "${DEPLOY_CONFIG_FILE}"

      - name: Build/Test (placeholder)
        run: |
          echo "Running build and tests..."
          # Replace with real commands, e.g.:
          # npm ci
          # npm test
          # npm run build

      - name: Deploy to STG (placeholder)
        run: |
          echo "Deploying to STG"
          bash ./scripts/deploy.sh stg "${DEPLOY_CONFIG_FILE}"

  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy-stg
    env:
      DEPLOY_CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
    # Ensures only one production deployment runs at a time.
    concurrency:
      group: prod
      cancel-in-progress: false
    environment:
      name: PROD
      # IMPORTANT:
      # Configure required reviewers in:
      # Repository Settings -> Environments -> prod -> Protection rules -> Required reviewers.
      # GitHub will pause this job here and request approval before steps execute.
      # Approval is completed in the workflow run UI ("Review deployments" for prod).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          echo "Using deploy config: ${DEPLOY_CONFIG_FILE}"
          if [[ ! -f "${DEPLOY_CONFIG_FILE}" ]]; then
            echo "Config file not found: ${DEPLOY_CONFIG_FILE}"
            exit 1
          fi
          jq empty "${DEPLOY_CONFIG_FILE}"

      - name: Build/Test (placeholder)
        run: |
          echo "Running build and tests..."
          # Replace with real commands.

      - name: Deploy to PROD (placeholder)
        run: |
          echo "Deploying to PROD"
          bash ./scripts/deploy.sh prod "${DEPLOY_CONFIG_FILE}"
