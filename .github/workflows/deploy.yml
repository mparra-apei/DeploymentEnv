name: Deploy Pipeline (Config Driven)

on:
  workflow_dispatch:
    inputs:
      json_file:
        description: "Path to deployment config JSON"
        required: false
        default: "config/deploy/main.json"
        type: string
      environment_selector:
        description: "Use 'all' or a comma-separated list (for example: STAGE,PROD)."
        required: false
        default: "all"
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-from-config:
    name: Deploy from main.json
    runs-on: ubuntu-latest
    env:
      DEPLOY_CONFIG_FILE: ${{ github.event_name == 'workflow_dispatch' && inputs.json_file || 'config/deploy/main.json' }}
      ENV_SELECTOR: ${{ github.event_name == 'workflow_dispatch' && inputs.environment_selector || 'all' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment config
        run: |
          echo "Using deploy config: ${DEPLOY_CONFIG_FILE}"
          if [[ ! -f "${DEPLOY_CONFIG_FILE}" ]]; then
            echo "Config file not found: ${DEPLOY_CONFIG_FILE}"
            exit 1
          fi
          jq empty "${DEPLOY_CONFIG_FILE}"
          echo "Configured environments in order:"
          jq -r '.environments // [] | .[]' "${DEPLOY_CONFIG_FILE}"

      - name: Build/Test (placeholder)
        run: |
          echo "Running build and tests..."
          # Replace with real commands.

      - name: Deploy using config order
        run: |
          echo "Deploy selector: ${ENV_SELECTOR}"
          echo "Config file path: ${DEPLOY_CONFIG_FILE}"
          echo "Current directory: $(pwd)"
          echo "Files in scripts/: $(ls -la ./scripts/ || echo 'scripts/ not found')"
          bash -x ./scripts/deploy.sh "${ENV_SELECTOR}" "${DEPLOY_CONFIG_FILE}"
